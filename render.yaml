services:
  # ── API (FastAPI) ─────────────────────────────────────────────────────────
  - type: web
    name: reelscribe-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter          # 512 MB RAM, $7/мес — достаточно для API без Whisper
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: AUDIO_TMP_DIR
        value: /tmp/reelscribe_audio
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: FRONTEND_URL
        value: https://reelscribe-ui.onrender.com

  # ── Worker (Whisper-воркер) ───────────────────────────────────────────────
  - type: worker
    name: reelscribe-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.workers.run
    plan: standard         # 2 GB RAM — нужно для faster-whisper medium ($25/мес)
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: AUDIO_TMP_DIR
        value: /tmp/reelscribe_audio
      - key: WORKER_CONCURRENCY
        value: "2"
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── Frontend (React + Vite → Static Site) ────────────────────────────────
  - type: web
    name: reelscribe-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://reelscribe-api.onrender.com
